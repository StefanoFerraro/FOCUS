defaults:
  - env: rs
  - agent: dreamer
  - override hydra/launcher: submitit_local

# agent: none
task: none
domain: ${env.name}
comment: ""

# experiment
experiment: pt
project_name: focus_skill

# misc
seed: 1
device: cuda
save_video: false
save_train_video: true
use_tb: true
use_wandb: true
curriculum_learning: false
target_modulator: 500000
expl_dataset: p2e
vis_target_dataset: False
evaluation_target_obs: False

# mode
obs_type: pixels
action_repeat: 2
reward_free: true
is_finetune: false
precision: 16
profile: false

# model specs
batch_size: 32
batch_length: 32
imag_horizon: 15
eval_state_mean: False
train_every_actions: 10

# train settings
num_train_frames: 2000010
num_seed_frames: 4000
# eval settings
eval_every_frames: 10000
num_eval_episodes: 5
# snapshot
snapshots: [100000, 250000, 500000, 1000000, 2000000] 
snapshot_dir: ../../../models/${task}/${comment}/${agent.name}/${seed}
# replay buffer
replay_buffer_size: 500000
replay_buffer_num_workers: 4
replay:   
  capacity: ${replay_buffer_size}
  ongoing: False
  minlen: 50
  maxlen: 50 
  prioritize_ends: False
# dataset dir for offline training
dataset_dir: none
# log settings
log_every_frames: 1000
recon_every_frames: 25000 # edit for debug
root_log_dir: '.'

hydra:
  run:
    dir: ${root_log_dir}/exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}_${task}_${comment}
  sweep:
    dir: ${root_log_dir}/exp_sweep/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}_${task}_${comment}
    subdir: ${hydra.job.num}
  launcher:
    timeout_min: 4300
    cpus_per_task: 10
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: 160
    nodes: 1
    submitit_folder: ${root_log_dir}/exp_sweep/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}_${task}_${comment}/.slurm
