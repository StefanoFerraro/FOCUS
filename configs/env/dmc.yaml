defaults:
  - segmenter

name: dmc
horizon: 1000
controller: "OSC_POSE" 
renderer:
  fps: 30
  size: [64, 64]
  camera: "agentview2" # "frontview", "agentview", "eye_in_hand"
  depths: True
  segmentation_level: "element" # None, class, instance or element 
  seg_size: [480, 480]
  gt_segmentation: True
reward_shaping: False
task_reward: "lift"
objects:
  rgba: [1, 0, 0, 1]
  minsize: 0.025
  spawn_range: 0.01
  random_placement: False
  name: ""  
goal:
  x: None
  y: None
  z: None
  point_goal: False

init_exploration_area: [[-0.05, 0.05], [-0.05, 0.05]]
limits_exploration_area: [[-0.24, 0.24], [-0.24, 0.24]]
object_start_pos: [0, 0]
target_modulator: 500000

visualize_target: True
env_target: False
target_from_replay_bf: False
only_obs_target: False
mixed_target: False # requires target_from_replay_bf = True for observations targets, otherwise only position targets are used
target_sampling_generation_strategy: "uniform"
batch_sampling: False

dist_as_rw: False
